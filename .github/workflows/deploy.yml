name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  # ------------------------------------------------------------------
  # Lint, type-check, and test both packages. Every push and PR.
  # ------------------------------------------------------------------
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-access-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: packages/backend/coverage
          retention-days: 7

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: packages/frontend/coverage
          retention-days: 7

  # ------------------------------------------------------------------
  # Build both Docker images. Validates the images build cleanly on
  # every PR; pushes to GHCR (tagged by commit SHA + latest) only for
  # commits landed on main, so there's a traceable, pullable artifact
  # for every deploy without pushing untested throwaway PR images.
  # ------------------------------------------------------------------
  build:
    name: Build Docker images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ------------------------------------------------------------------
  # Deploy: only for commits on main, after a successful build. SSHes
  # into the production host and runs the same scripts/deploy.sh a
  # human would run by hand, so there's exactly one deploy code path.
  # Gated behind the `production` environment for a manual approval
  # step if one is configured in the repo's environment settings.
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            ./scripts/deploy.sh origin/main

      - name: Verify deployment
        run: |
          curl -fsS "${{ vars.PRODUCTION_HEALTH_URL }}" \
            || (echo "Post-deploy health check failed" && exit 1)
