# Production stack for MedAssist AI.
#
# The backend is mid-migration from PostgreSQL to MongoDB (see
# packages/backend/src/config/database.ts's header comment and
# scripts/migrate-data.js): auth/patient/doctor/appointment/report/feedback
# read-writes all still go through Postgres today, while the newer Mongoose
# models (Patient/Doctor/Report/Appointment) are the migration target. Both
# databases are therefore required in production until that migration is
# complete — omitting Postgres here would leave every currently-working
# endpoint returning 500s.
#
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: medassist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-medassist}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-medassist}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-medassist} -d ${DB_NAME:-medassist}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medassist-network
    # No published host port — only reachable from other containers on
    # medassist-network. Expose 5432 here only for a one-off migration/psql
    # session, never leave it published in a real deploy.

  mongodb:
    image: mongo:7.0
    container_name: medassist-mongodb
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/etc/mongo-keyfile", "--auth"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME must be set}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD must be set}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-medassist_ai}
    volumes:
      - mongo-data:/data/db
      # Internal cluster-auth key for the replica set. Generate it with
      # `scripts/deploy.sh` (openssl rand -base64 756, chmod 400) — it is
      # a secret and must never be committed (see .gitignore).
      - ./mongo/mongo-keyfile:/etc/mongo-keyfile:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "${MONGO_INITDB_ROOT_USERNAME}", "-p", "${MONGO_INITDB_ROOT_PASSWORD}", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - medassist-network

  # One-shot: turns the single mongod instance into a (single-node) replica
  # set on first boot. Idempotent — safe to run again on every `up`.
  mongo-init:
    image: mongo:7.0
    container_name: medassist-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    networks:
      - medassist-network
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        mongosh --quiet \
          -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" \
          --authenticationDatabase admin --host mongodb --eval '
            try {
              rs.status();
              print("replica set already initiated");
            } catch (e) {
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] });
              print("replica set initiated");
            }
          '
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME must be set}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD must be set}

  redis:
    image: redis:7.4-alpine
    container_name: medassist-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medassist-network

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: medassist-backend:${IMAGE_TAG:-latest}
    container_name: medassist-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api/v1
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      SOCKET_CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}

      # ---------- Postgres (legacy, still live — see header comment) ----------
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-medassist}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-medassist}

      # ---------- MongoDB (migration target) ----------
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME:-medassist_ai}?authSource=admin&replicaSet=rs0

      # ---------- Redis ----------
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_ENABLED: "true"
      PREDICTION_CACHE_TTL_SECONDS: ${PREDICTION_CACHE_TTL_SECONDS:-3600}

      # ---------- Auth ----------
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ./logs
      EMERGENCY_NUMBER: ${EMERGENCY_NUMBER:-1122}
    volumes:
      - backend-logs:/app/packages/backend/logs
      - backend-uploads:/app/packages/backend/uploads
    networks:
      - medassist-network
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://medassist.example.com/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-https://medassist.example.com}
        VITE_EMERGENCY_NUMBER: ${EMERGENCY_NUMBER:-1122}
    image: medassist-frontend:${IMAGE_TAG:-latest}
    container_name: medassist-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - medassist-network

  nginx:
    image: nginx:1.27-alpine
    container_name: medassist-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - medassist-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/.well-known/acme-challenge/", "||", "exit", "0"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  medassist-network:
    driver: bridge

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  backend-logs:
  backend-uploads:
  certbot-webroot:
