# ============================================================
# MedAssist AI — edge reverse proxy (nginx/nginx.conf)
# --------------------------------------------------------------
# Sits in front of the `frontend` (static Nginx) and `backend`
# (Node/PM2) containers — see docker-compose.prod.yml. Terminates
# TLS, routes /api + /socket.io to the backend, everything else to
# the frontend, and applies the shared security/gzip/rate-limit
# policy in one place instead of duplicating it per-service.
#
# Replace `medassist.example.com` and the certificate paths below
# with your real domain / cert locations (e.g. from certbot) before
# deploying.
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Uploads (symptom report attachments, etc.) — keep in sync with the
  # backend's MAX_UPLOAD_BYTES env var (default 5MB); a little headroom
  # for multipart overhead.
  client_max_body_size 10m;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Basic abuse protection in front of the app's own per-route limiter
  # (see backend/src/middleware/rateLimiter.middleware.ts).
  limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream backend_upstream {
    # Scale by adding more `backend` replicas in docker-compose.prod.yml
    # and listing them here (PM2 itself stays single-instance — see
    # ecosystem.config.js for why).
    server backend:3000;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:8080;
    keepalive 16;
  }

  # ---------- HTTP: redirect to HTTPS, except ACME challenge ----------
  server {
    listen 80;
    server_name medassist.example.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---------- HTTPS: the real thing ----------
  server {
    listen 443 ssl;
    http2 on;
    server_name medassist.example.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------- API ----------
    location /api/ {
      limit_req zone=general burst=40 nodelay;

      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;
    }

    # Tighter limit on auth endpoints (login/signup/guest) — mirrors the
    # backend's own stricter authLimiter, applied one hop earlier.
    location ~ ^/api/v[0-9]+/auth/ {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Socket.io (real-time notifications) ----------
    location /socket.io/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s; # long-lived websocket connections
    }

    # ---------- Backend health check, proxied through for external monitors ----------
    location = /api/health {
      proxy_pass http://backend_upstream/health;
      access_log off;
    }

    # ---------- Everything else: the React SPA ----------
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
